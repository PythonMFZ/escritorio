services:
  - type: web
    name: maffezzolli-capital-site
    runtime: static
    staticPublishPath: .
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=3600
      - path: /css/*
        name: Cache-Control
        value: public, max-age=86400
      - path: /js/*
        name: Cache-Control
        value: public, max-age=86400
      - path: /data/*
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
    routes:
      - type: rewrite
        source: /o-que-fazemos
        destination: /o-que-fazemos.html
      - type: rewrite
        source: /quem-somos
        destination: /quem-somos.html
      - type: rewrite
        source: /nossa-tecnologia
        destination: /augur.html
      - type: rewrite
        source: /augur
        destination: /augur.html
      - type: rewrite
        source: /cases
        destination: /cases.html
      - type: rewrite
        source: /augur-pme
        destination: /augur-pme.html
      - type: rewrite
        source: /pesquisa-nps
        destination: /pesquisa-nps.html
      - type: rewrite
        source: /pesquisa-app
        destination: /pesquisa-app.html
